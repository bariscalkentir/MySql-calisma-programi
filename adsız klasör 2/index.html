<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySQL Çalışma Notları</title>
    <meta name="description" content="MySQL temel konuları için interaktif çalışma notları - Section 1'den 13'e kadar">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Sidebar Navigation -->
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon">🐬</span>
                <span class="logo-text">MySQL</span>
            </div>
            <button class="sidebar-toggle" id="sidebarToggle">✕</button>
        </div>
        <div class="sidebar-search">
            <input type="text" id="searchInput" placeholder="Konu ara..." autocomplete="off">
        </div>
        <ul class="nav-list" id="navList"></ul>
        <div class="sidebar-footer">
            <div class="progress-bar-container">
                <div class="progress-label">İlerleme: <span id="progressText">0/13</span></div>
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <header class="top-bar">
            <button class="menu-btn" id="menuBtn">☰</button>
            <div class="breadcrumb" id="breadcrumb">Ana Sayfa</div>
            <div class="top-actions">
                <button class="theme-toggle" id="themeToggle" title="Tema Değiştir">🌙</button>
            </div>
        </header>

        <!-- Hero Section -->
        <section class="hero" id="hero">
            <div class="hero-content">
                <h1>MySQL Çalışma Notları</h1>
                <p class="hero-subtitle">mysqltutorial.org kaynaklı kapsamlı notlar — Section 1'den 13'e kadar</p>
                <div class="hero-stats">
                    <div class="stat"><span class="stat-number">13</span><span class="stat-label">Bölüm</span></div>
                    <div class="stat"><span class="stat-number">60+</span><span class="stat-label">Konu</span></div>
                    <div class="stat"><span class="stat-number">100+</span><span class="stat-label">Örnek</span></div>
                </div>
            </div>
        </section>

        <!-- Content Area -->
        <div class="content-area" id="contentArea"></div>
    </main>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
